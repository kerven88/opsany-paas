# my global config
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
           - PROM_CONSUL_SERVER:9093

      basic_auth:
        username: admin
        password: PROM_SERVER_PASSWD

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  - "/var/lib/prometheus-config/rules/*rules.yml"  # 增加告警规则yml文件路径
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "prometheus"

    # metrics_path defaults to '/metrics'
    # scheme defaults to 'http'.

#    static_configs:
#      - targets: ["localhost:9090"]
    basic_auth:
      username: admin
      password: PROM_SERVER_PASSWD

  # Local Node  注释本地
#  - job_name: "local"
#    static_configs:
#      - targets: ["LOCAL_IP:9100"]

  - job_name: 'consul-prometheus'  # 从consul读取主机信息
    consul_sd_configs:
    - server: 'PROM_CONSUL_SERVER:8500'  # 配置consul服务，PROM_CONSUL_SERVER只需填入域名或IP地址
      token: CONSUL_TOKEN
      services: []
    relabel_configs:
      # 新增：如果 tags 中包含 blackbox_ 开头的标签，则丢弃
      - source_labels: [__meta_consul_tags]
        regex: .*blackbox_.*
        action: drop
      - regex: __meta_consul_service_metadata_(.+) # 添加meta的重新匹配，Mate数据为Labels标签
        action: labelmap   #
      - source_labels: [__meta_consul_service_id]  # 过滤consul自测服务数据 consul 127.0.0.1:8300
        regex: ^(consul)
        action: drop
      - source_labels: [__meta_consul_service_metadata_endwith]  # 过滤scrape, 此为自定义的exporter
        regex: ^(scrape)
        action: drop

  - job_name: consul-prometheus-scrape  # 自定义Exporter 通过参数获取不同实例exporter指标
    scrape_interval: 15s
    scrape_timeout: 5s
    consul_sd_configs:
      - server: 'PROM_CONSUL_SERVER:8500' # 修改你consul服务所在的ip地址
        token: CONSUL_TOKEN
        refresh_interval: 15s
        services: []
    metrics_path: /scrape # 监控多实例时要把/metrics自定义为/scrape
    relabel_configs:
      - regex: __meta_consul_service_metadata_(.+) # 添加meta的重新匹配，Mate数据为Labels标签
        action: labelmap   #
      - source_labels: ['__meta_consul_service']
        regex: "consul"  # 过滤consul自测服务数据 consul 127.0.0.1:8300
        action: drop
      - source_labels: ['__meta_consul_service_metadata_endwith']  # 将endwith=scrape匹配出来作为自定义传参配置
        regex: "scrape"
        action: keep
      - source_labels: ['__meta_consul_service_metadata_instance']  # 定义endpoint的参数 target=instance
        target_label: __param_target

  # ==================== Blackbox 探测任务（按频率拆分） ====================
  # 说明：每个协议支持 1m,5m,10m,15m,20m,30m 六种频率，通过 Consul 标签区分
  # 标签格式：blackbox_<协议>_<频率>，例如 blackbox_http_1m, blackbox_tcp_5m 等
  # 动态 Blackbox 地址：优先使用 Consul Meta 中的 blackbox_addr，若缺失则回退到 PROM_CONSUL_SERVER:9115

  # ---------- 1. HTTP GET 探测 ----------
  - job_name: "consul-blackbox_http_1m"
    scrape_interval: 1m
    metrics_path: /probe
    params:
      module: [http_2xx]
    consul_sd_configs:
      - server: 'PROM_CONSUL_SERVER:8500'
        token: CONSUL_TOKEN
        services: []
    relabel_configs:
      - source_labels: [__meta_consul_tags]
        regex: .*blackbox_http_1m.*
        action: keep
      - regex: __meta_consul_service_metadata_(.+)
        action: labelmap
      - source_labels: [__meta_consul_service_address]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [__meta_consul_service_metadata_instance]
        target_label: instance
      - source_labels: [__meta_consul_service_metadata_blackbox_addr]
        target_label: __address__
      - source_labels: [__address__]
        regex: '^$'
        target_label: __address__
        replacement: PROM_CONSUL_SERVER:9115

