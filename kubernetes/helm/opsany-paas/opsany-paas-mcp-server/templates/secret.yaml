apiVersion: v1
kind: Secret
metadata:
  name: opsany-paas-mcp-server-config
  namespace: {{ .Release.Namespace | quote }}
  labels: 
    {{- include "opsany-paas-mcp-server.labels" . | nindent 4 }}
type: Opaque
data:
{{ (.Files.Glob "config.yaml").AsSecrets | indent 2 }} 

---

apiVersion: v1
kind: Secret
metadata:
  name: opsany-paas-mcp-server-supervisor
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opsany-paas-mcp-server.labels" . | nindent 4 }}
type: Opaque
data:
{{ (.Files.Glob "mcp.ini").AsSecrets | indent 2 }}
