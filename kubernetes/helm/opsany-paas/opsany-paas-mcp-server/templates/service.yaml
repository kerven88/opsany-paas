apiVersion: v1
kind: Service
metadata:
  name: {{ include "opsany-paas-mcp-server.fullname" . }}
  labels:
    {{- include "opsany-paas-mcp-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8020
      protocol: TCP
      name: paas-login
  selector:
    {{- include "opsany-paas-mcp-server.selectorLabels" . | nindent 4 }}
